<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ST Multiplayer Relay</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
</head>
<body>
  <main class="container py-4 py-lg-5">
    <section class="hero-panel p-4 p-lg-5 mb-4">
      <p class="eyebrow mb-2">SillyTavern Multiplayer Relay</p>
      <h1 class="display-6 fw-bold mb-3">Локальный relay для ручных мультиплеерных ходов</h1>
      <p class="lead text-secondary mb-0">Админ создаёт комнату, игроки готовят действия, а SillyTavern отвечает через подключённое extension.</p>
    </section>

    <div class="row g-4 align-items-stretch">
      <div class="col-12 col-lg-6">
        <section class="glass-card h-100 p-4">
          <p class="section-kicker mb-2">Admin</p>
          <h2 class="h4 mb-3">Вход в админский интерфейс</h2>
          <form id="adminEntryForm" class="vstack gap-3">
            <div>
              <label class="form-label" for="adminKey">Admin Key</label>
              <input id="adminKey" name="adminKey" class="form-control form-control-lg" type="password" autocomplete="off" spellcheck="false" required>
            </div>
            <div>
              <label class="form-label" for="adminName">Admin Name</label>
              <input id="adminName" name="adminName" class="form-control form-control-lg" value="Admin" autocomplete="nickname" required>
            </div>
            <button class="btn btn-accent btn-lg" type="submit">Открыть админку</button>
          </form>
        </section>
      </div>

      <div class="col-12 col-lg-6">
        <section class="glass-card h-100 p-4">
          <p class="section-kicker mb-2">Guest</p>
          <h2 class="h4 mb-3">Подключение к комнате</h2>
          <form id="guestEntryForm" class="vstack gap-3">
            <div>
              <label class="form-label" for="roomId">Room ID</label>
              <input id="roomId" name="roomId" class="form-control form-control-lg" autocomplete="off" required>
            </div>
            <div>
              <label class="form-label" for="guestName">Name</label>
              <input id="guestName" name="name" class="form-control form-control-lg" autocomplete="nickname" required>
            </div>
            <button class="btn btn-outline-light btn-lg" type="submit">Открыть комнату</button>
          </form>
        </section>
      </div>
    </div>
  </main>

  <script>
    const RELAY_STORAGE_KEYS = {
      adminBootstrapKey: 'relay.admin.bootstrapKey',
      adminName: 'relay.admin.name',
    };
    const adminForm = document.getElementById('adminEntryForm');
    const guestForm = document.getElementById('guestEntryForm');

    adminForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const formData = new FormData(adminForm);
      const adminKey = String(formData.get('adminKey') || '').trim();
      const adminName = String(formData.get('adminName') || '').trim();

      if (!adminKey || !adminName) {
        return;
      }

      try {
        window.sessionStorage.setItem(RELAY_STORAGE_KEYS.adminBootstrapKey, adminKey);
        window.sessionStorage.setItem(RELAY_STORAGE_KEYS.adminName, adminName);
      } catch (_error) {
        // Fall back to plain navigation if storage is unavailable.
      }

      window.location.href = '/admin';
    });

    guestForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const formData = new FormData(guestForm);
      const roomId = String(formData.get('roomId') || '').trim();
      const name = String(formData.get('name') || '').trim();

      if (!roomId || !name) {
        return;
      }

      const search = new URLSearchParams({ name });
      window.location.href = `/room/${encodeURIComponent(roomId)}?${search.toString()}`;
    });
  </script>
</body>
</html>
